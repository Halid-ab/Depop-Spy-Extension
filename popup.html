<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        p {
            font-size: 14px;
            line-height: 1.4;
            color: #666;
        }
        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <h2>🕵️ Depop Price Spy</h2>
    <p>
        Navigate to any Depop product page to see:
    </p>
    <ul>
        <li>Days since listed</li>
        <li>Price drop history</li>
        <li>Average sold price for similar items</li>
        <li>Deal rating</li>
    </ul>
    <div class="footer">
        Works automatically on product pages.
    </div>
</body>
</html>
